kind = "mobile"
previewPath = "/"
title = "Dijital Evcil Hayvan"
version = "1.0.0"
id = "artifacts/digital-pet"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 24207
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/digital-pet run dev"

[services.env]
PORT = "24207"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/digital-pet", "run", "build"]
run = ["pnpm", "--filter", "@workspace/digital-pet", "run", "serve"]
